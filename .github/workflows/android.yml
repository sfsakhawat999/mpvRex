name: Build Android APK

on:
  push:
    branches: [ "main" ] # Adjust to your main branch name if different
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Speed Optimization: Cache Gradle Packages & Cache Build Objects
    - name: Cache Gradle Packages & Build Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle/configuration-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # Speed Optimization: Run Gradle with Incremental Flags
    - name: Build Debug APK
      run: ./gradlew assembleDebug --build-cache --configuration-cache --parallel

    # FIX: Locate and find the generated APK path automatically
    - name: Upload Universal APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MPVPLAY-universal-debug-apk
        path: |
          app/build/outputs/apk/**/*universal*.apk
        retention-days: 7
