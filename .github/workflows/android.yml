name: Build Android APK

on:
  push:
    branches: [ "main" ] # Change to your default branch name if it isn't main
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # --- SPEED OPTIMIZATION: CACHE GRADLE DEPENDENCIES & BUILD FILES ---
    - name: Cache Gradle Packages & Build Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle/configuration-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # --- SPEED OPTIMIZATION: RUN GRADLE WITH INCREMENTAL BUILD FLAGS ---
    # --build-cache enables Gradle to reuse local build outputs from the cached directory.
    # --configuration-cache reuses the build configuration step if build scripts haven't changed.
    - name: Build Debug APK
      run: ./gradlew assembleDebug --build-cache --configuration-cache --parallel

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MPVPLAY-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
